<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Learn Japanese</title>
<link rel="stylesheet" href="style.css?v=7">
</head>
<body>
  <div class="app-shell">
    <button id="sidebarToggle" class="sidebar-toggle" aria-label="Buka menu">☰</button>
    <div id="sidebarOverlay" class="sidebar-overlay hidden"></div>

    <aside id="sidebar" class="sidebar">
      <div class="sidebar-brand">Learn Japanese<span>JLPT N5 · N4</span></div>
      <nav class="sidebar-nav">
        <button class="nav-item active" data-view="flashcard">
          <span class="nav-icon">🎴</span><span>Flashcard</span>
        </button>
        <button class="nav-item" data-view="list">
          <span class="nav-icon">📋</span><span>Daftar Kosakata</span>
        </button>
        <button class="nav-item" data-view="kanji">
          <span class="nav-icon">🀄</span><span>Kanji Quizzer</span>
        </button>
        <button class="nav-item" data-view="quiz">
          <span class="nav-icon">📝</span><span>Latihan Soal</span>
        </button>
      </nav>
    </aside>

    <div class="app-main">
      <header class="topbar">
        <div class="stats">
          <div class="stat"><span id="statDue">0</span><label>Jatuh tempo</label></div>
          <div class="stat"><span id="statLearning">0</span><label>Dipelajari</label></div>
          <div class="stat"><span id="statMastered">0</span><label>Dikuasai</label></div>
          <div class="stat"><span id="statTotal">0</span><label>Total</label></div>
        </div>
      </header>

      <main>
        <section id="view-flashcard" class="view">
          <div class="level-bar">
            <div class="fmt-toggle vocab-level-toggle" data-vocab-level-toggle>
              <button data-vlevel="N5" class="fmt-btn">N5</button>
              <button data-vlevel="N4" class="fmt-btn">N4</button>
            </div>
          </div>
          <div id="progressWrap">
            <div id="progressBar"></div>
          </div>

          <section id="cardStage">
            <div id="emptyState" class="hidden">
              <h2>🎉 Semua kartu jatuh-tempo sudah selesai!</h2>
              <p>Kembali lagi nanti, atau pelajari lebih banyak kartu baru sekarang.</p>
              <button id="studyMoreBtn" class="primary">Pelajari kartu baru</button>
            </div>

            <div id="card" class="card">
              <div class="card-box" id="cardBox">
                <div class="card-face card-front">
                  <span class="badge" id="cardType"></span>
                  <button id="hintBtn" class="hint-btn" title="Tampilkan hiragana/katakana (H)">💡 Hint</button>
                  <div class="kanji" id="cardKanji"></div>
                  <div class="kana-hint" id="cardKanaHint"></div>
                  <div class="hint">Klik kartu atau tekan Spasi untuk membuka</div>
                </div>
                <div class="card-face card-back">
                  <div class="kanji small" id="cardKanjiBack"></div>
                  <div class="kana" id="cardKana"></div>
                  <div class="romaji" id="cardRomaji"></div>
                  <div class="meaning" id="cardMeaning"></div>
                </div>
              </div>
            </div>

            <div id="rateButtons" class="rate-buttons hidden">
              <button data-rate="belum" class="rate belum">Belum Hafal<small>2x lebih sering</small></button>
              <button data-rate="hafal" class="rate hafal">Hafal Arti<small>normal</small></button>
              <button data-rate="sudah" class="rate sudah">Sudah Hafal<small>0,5x lebih sering</small></button>
            </div>
          </section>

          <div class="toolbar">
            <button id="resetProgressBtn" class="ghost">Reset progres</button>
            <span id="toast"></span>
          </div>
        </section>

        <section id="view-list" class="view hidden">
          <div class="list-toolbar">
            <div class="fmt-toggle vocab-level-toggle" data-vocab-level-toggle>
              <button data-vlevel="N5" class="fmt-btn">N5</button>
              <button data-vlevel="N4" class="fmt-btn">N4</button>
            </div>
            <input type="search" id="vocabSearch" placeholder="Cari kanji, kana, romaji, atau arti...">
            <span id="listCount" class="list-count"></span>
          </div>
          <div class="vocab-table-wrap">
            <table class="vocab-table">
              <thead>
                <tr>
                  <th>Kanji</th>
                  <th>Kana</th>
                  <th>Romaji</th>
                  <th>Jenis</th>
                  <th>Arti</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody id="vocabTableBody"></tbody>
            </table>
          </div>
        </section>

        <section id="view-kanji" class="view hidden">
          <div class="kq-header">
            <div class="fmt-toggle" id="kqLevelToggle">
              <button data-level="N5" class="fmt-btn">N5</button>
              <button data-level="N4" class="fmt-btn">N4</button>
            </div>
            <div class="kq-score">
              <span class="kq-score-correct">✓ <b id="kqCorrect">0</b></span>
              <span class="kq-score-wrong">✘ <b id="kqWrong">0</b></span>
            </div>
          </div>

          <div class="kq-header">
            <div class="fmt-toggle" id="kqQuestionFormatToggle">
              <button data-fmt="kanji" class="fmt-btn">Kanji</button>
              <button data-fmt="kana" class="fmt-btn">Kana</button>
              <button data-fmt="english" class="fmt-btn">English</button>
            </div>
          </div>

          <div class="kq-meta">
            <span id="kqGroupLabel"></span>
            <span id="kqPositionLabel"></span>
          </div>

          <div class="kq-question" id="kqQuestion"></div>

          <div class="kq-choices" id="kqChoices"></div>

          <div class="fmt-toggle kq-answer-toggle" id="kqAnswerFormatToggle"></div>

          <div id="kqDone" class="hidden">
            <h2>🎉 Kuis selesai!</h2>
            <p id="kqDoneSummary"></p>
            <button id="kqRestartBtn" class="primary">Main lagi</button>
          </div>
        </section>

        <section id="view-quiz" class="view hidden">
          <div class="kq-header">
            <div class="fmt-toggle" id="pqLevelToggle">
              <button data-level="N5" class="fmt-btn">N5</button>
              <button data-level="N4" class="fmt-btn">N4</button>
            </div>
            <div class="kq-score">
              <span class="kq-score-correct">✓ <b id="pqCorrect">0</b></span>
              <span class="kq-score-wrong">✘ <b id="pqWrong">0</b></span>
            </div>
          </div>

          <div class="kq-header">
            <div class="fmt-toggle" id="pqSectionToggle">
              <button data-section="vocab" class="fmt-btn">Kosakata</button>
              <button data-section="grammar" class="fmt-btn">Tata Bahasa</button>
              <button data-section="reading" class="fmt-btn">Membaca</button>
            </div>
          </div>

          <div class="kq-meta">
            <span id="pqSectionLabel"></span>
            <span id="pqPositionLabel"></span>
          </div>

          <div class="pq-passage hidden" id="pqPassage"></div>
          <div class="pq-question" id="pqQuestion"></div>
          <div class="pq-note hidden" id="pqNote"></div>
          <div class="pq-choices" id="pqChoices"></div>

          <div id="pqDone" class="hidden">
            <h2>🎉 Latihan selesai!</h2>
            <p id="pqDoneSummary"></p>
            <button id="pqRestartBtn" class="primary">Ulangi</button>
          </div>
        </section>
      </main>
    </div>
  </div>

<script src="app.js?v=7"></script>
</body>
</html>
